name: Build Tuluva Guardian APK
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Tuluva Guardian APK
        run: |
          npm install -g @bubblewrap/cli
          
          # Create local manifest to bypass network and path errors
          cat <<EOF > manifest.json
          {
            "name": "Tuluva Guardian",
            "short_name": "Tuluva",
            "start_url": "https://tuluva-guardian.tuluvaguardian.replit.app/",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#000000",
            "icons": [{"src": "https://raw.githubusercontent.com/GoogleChromeLabs/bubblewrap/main/packages/cli/src/lib/images/icon.png", "sizes": "512x512", "type": "image/png"}]
          }
          EOF

          # This 'printf' line automatically answers "N" to the setup questions 
          # that were causing the Exit Code 130 freeze.
          printf "N\nN\n" | bubblewrap init --manifest ./manifest.json --quiet --yes || true
          
          # Manually point to the pre-installed SDK if needed, then build
          bubblewrap build --skipSigning
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tuluva-Guardian-Final
          path: ./*.apk
          
