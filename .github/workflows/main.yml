name: Tuluva Guardian High-Capacity Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Large APK
        run: |
          # Use the Gradle Wrapper directly to avoid Bubblewrap's URL validation
          chmod +x gradlew || true
          ./gradlew assembleRelease || echo "Manual build failed, trying debug"
          ./gradlew assembleDebug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-tuluva
          name: Tuluva Guardian Release
          # This will find any APK in your build folders, even if it's over 25MB
          files: "**/*.apk"
         
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          Url 
https://www.mediafire.com/file/qvnpgutmmua83gd/_Tuluva_Guardian_19690191.apk/file

          
