name: Build Tuluva Guardian APK
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK without Icons
        run: |
          npm install -g @bubblewrap/cli
          # This creates a dummy icon so the build doesn't fail
          mkdir -p android_icons
          curl -L https://raw.githubusercontent.com/GoogleChromeLabs/bubblewrap/main/packages/cli/src/lib/images/icon.png -o icon.png
          
          # Force the build to ignore missing local files
          bubblewrap init --manifest https://tuluva-guardian.tuluvaguardian.replit.app/manifest.json --quiet --yes
          bubblewrap build --skipSigning
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tuluva-Guardian-Free-APK
          path: ./*.apk
          
