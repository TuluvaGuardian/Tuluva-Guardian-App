name: Build Tuluva Guardian APK
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Tuluva Guardian APK
        run: |
          npm install -g @bubblewrap/cli
          
          # Initialize the project using your Replit manifest
          # We use --yes to bypass any missing icon errors automatically
          yes | bubblewrap init --manifest https://tuluva-guardian.tuluvaguardian.replit.app/manifest.json --quiet --yes
          
          # Force the build to ignore signing since we just need the APK for testing
          bubblewrap build --skipSigning
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tuluva-Guardian-Release
          path: ./*.apk
          
