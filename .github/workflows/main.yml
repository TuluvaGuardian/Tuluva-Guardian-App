name: Build Tuluva Guardian APK
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Tuluva Guardian APK
        run: |
          npm install -g @bubblewrap/cli
          
          # 1. Manually create the configuration file to skip all setup questions
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          
          # 2. Create local manifest to avoid network errors
          cat <<EOF > manifest.json
          {
            "name": "Tuluva Guardian",
            "short_name": "Tuluva",
            "start_url": "https://tuluva-guardian.tuluvaguardian.replit.app/",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#000000",
            "icons": [{"src": "https://raw.githubusercontent.com/GoogleChromeLabs/bubblewrap/main/packages/cli/src/lib/images/icon.png", "sizes": "512x512", "type": "image/png"}]
          }
          EOF

          # 3. Initialize and Build
          # The --yes flag combined with our pre-made config.json skips the interactive hang
          bubblewrap init --manifest ./manifest.json --quiet --yes
          bubblewrap build --skipSigning
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tuluva-Guardian-Final
          path: ./*.apk
          
