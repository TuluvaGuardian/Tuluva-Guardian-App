name: Build Tuluva Guardian APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Tuluva Guardian APK
        run: |
          npm install -g @bubblewrap/cli
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          
          # 1. Create the manifest with your Tuluva Guardian details
          echo '{"host":"tuluva-guardian.tuluvaguardian.replit.app","name":"Tuluva Guardian","launcherName":"Tuluva","themeColor":"#000000","navigationColor":"#000000","startUrl":"/","iconUrl":"https://raw.githubusercontent.com/GoogleChromeLabs/bubblewrap/main/packages/cli/src/lib/images/icon.png","packageId":"com.tuluva.guardian","appVersion":"1.0.0","appVersionCode":1,"displayMode":"standalone"}' > twa-manifest.json
          
          # 2. THE NUCLEAR FIX: Use 'yes' to answer every possible prompt automatically
          # This specifically stops the 'would you like to regenerate' loop from Run 47
          yes "no" | bubblewrap init --manifest twa-manifest.json --directory ./ || true
          
          # 3. Grant permissions to the generated build script
          chmod +x gradlew || true
          
          # 4. Build with version overrides to
          
