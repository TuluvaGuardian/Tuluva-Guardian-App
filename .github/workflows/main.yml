name: Build Tuluva Guardian APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Tuluva Guardian APK
        run: |
          npm install -g @bubblewrap/cli
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json
          
          # 1. Create the manifest
          echo '{"host":"tuluva-guardian.tuluvaguardian.replit.app","name":"Tuluva Guardian","launcherName":"Tuluva","themeColor":"#000000","navigationColor":"#000000","startUrl":"/","iconUrl":"https://raw.githubusercontent.com/GoogleChromeLabs/bubblewrap/main/packages/cli/src/lib/images/icon.png","maskableIconUrl":"https://raw.githubusercontent.com/GoogleChromeLabs/bubblewrap/main/packages/cli/src/lib/images/icon.png","packageId":"com.tuluva.guardian","notificationChannelId":"tuluva-guardian-notifications","orientation":"default","displayMode":"standalone","appVersion":"1.0.0","appVersionCode":1,"generatorApp":"bubblewrap-cli"}' > twa-manifest.json
          
          # 2. THE FIX: Use 'init' with the explicit skip flags
          # This stops the 'Invalid URL' crash from Run 48/50
          bubblewrap init --manifest twa-manifest.json --directory ./ --metaData ./ --no-interactive --skipStoreConsoleCheck || true
          
          # 3. Ensure permissions exist before building
          chmod +x gradlew || true
          
          # 4. Build with every override enabled
          bubblewrap build --skipSigning --versionName "1.0.0" --versionCode 1 --yes --skipStoreConsoleCheck

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tuluva-Guardian-Final
          path: "**/*.apk"
          if-no-files-found: error
          
