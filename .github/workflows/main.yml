name: Build Tuluva Guardian APK
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK (Bypass Manifest Errors)
        run: |
          npm install -g @bubblewrap/cli
          mkdir -p ~/.bubblewrap
          echo '{"jdkPath":"/usr/lib/jvm/temurin-17-jdk-amd64","androidSdkPath":"/usr/local/lib/android/sdk"}' > ~/.bubblewrap/config.json
          
          # This command forces a fresh initialization that ignores your current manifest's icon requirements
          yes | bubblewrap init --manifest https://tuluva-guardian.tuluvaguardian.replit.app/manifest.json --quiet --yes
          
          # This specifically tells the builder to generate its own splash and icons locally
          bubblewrap build --skipSigning
          
      - name: Upload Tuluva Guardian APK
        uses: actions/upload-artifact@v4
        with:
          name: Tuluva-Guardian-Final-APK
          path: ./*.apk
          
