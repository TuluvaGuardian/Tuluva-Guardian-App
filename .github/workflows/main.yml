name: Build Tuluva Guardian APK
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build TWA APK
        uses: sst-it/action-bubblewrap@v1.1.0
        with:
          # This manifest contains your Tuluva Guardian details
          twa-manifest: |
            {
              "host": "tuluva-guardian.tuluvaguardian.replit.app",
              "name": "Tuluva Guardian",
              "launcherName": "Tuluva",
              "themeColor": "#000000",
              "navigationColor": "#000000",
              "startUrl": "/",
              "iconUrl": "https://raw.githubusercontent.com/GoogleChromeLabs/bubblewrap/main/packages/cli/src/lib/images/icon.png",
              "packageId": "com.tuluva.guardian",
              "appVersion": "1.0.0",
              "appVersionCode": 1,
              "displayMode": "standalone"
            }
          signing-key-path: '' # Leaves it unsigned as requested

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tuluva-Guardian-APK
          path: ./**/*.apk
          
