name: Build Tuluva Guardian APK
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Force Build Without Network
        run: |
          npm install -g @bubblewrap/cli
          
          # 1. Create a local manifest file so we don't have to fetch from Replit
          cat <<EOF > manifest.json
          {
            "name": "Tuluva Guardian",
            "short_name": "Tuluva",
            "start_url": "https://tuluva-guardian.tuluvaguardian.replit.app/",
            "display": "standalone",
            "background_color": "#ffffff",
            "theme_color": "#000000",
            "icons": [{"src": "https://raw.githubusercontent.com/GoogleChromeLabs/bubblewrap/main/packages/cli/src/lib/images/icon.png", "sizes": "512x512", "type": "image/png"}]
          }
          EOF

          # 2. Initialize using the file we just made
          yes | bubblewrap init --manifest ./manifest.json --quiet --yes
          
          # 3. Final build
          bubblewrap build --skipSigning
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Tuluva-Guardian-Final
          path: ./*.apk
          
